{% extends 'EasySurvey/survey-base.html' %}
{% load static %}

{% block title %}
  アンケート編集
{% endblock %}

{% block survey_main %}
<div class="container mt-4">
    <h2>アンケート編集</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_title">タイトル</label>
            <textarea class="form-control" id="id_title" name="title" rows="1" placeholder="タイトルを入力">{{ form.instance.title }}</textarea>
        </div>
        <div class="form-group">
            <label for="id_detail">備考</label>
            <textarea class="form-control" id="id_detail" name="detail" rows="3" placeholder="備考を入力">{{ form.instance.detail }}</textarea>
        </div>
        <div class="text-danger">
            {{ form.non_field_errors }}
            {{ form.title.errors }}
            {{ form.detail.errors }}
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% url 'survey-list'%}" class="btn btn-secondary">キャンセル</a>
    </form>
</div>
{% endblock %}
