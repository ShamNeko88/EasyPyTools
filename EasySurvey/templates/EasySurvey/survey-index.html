{% extends 'TopPage/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/survey.css' %}" />
{% endblock %}

{% block title %}
  EasySurvey
{% endblock %}

{% block content %}
<div class="container">
    <form>
        <div class="text-right">
            <button type="button" class="btn btn-primary">下記内容で作成</button>
        </div>
        <div class="form-group">
            <label for="title">タイトル</label>
            <input type="text" class="form-control" id="title" placeholder="タイトルを入力">
        </div>
        <div class="form-group">
            <label for="notes">備考</label>
            <textarea class="form-control" id="notes" rows="3" placeholder="備考を入力"></textarea>
        </div>
        <div class="form-group">
            <label for="question1">質問1</label>
            <input type="text" class="form-control" id="question1" placeholder="質問を入力">
        </div>
        <div class="form-group text-center">
            <button type="button">＋</button>
        </div>
        <div class="form-group">
            <div class="row">
                <div class="col">
                    <label for="respondent">回答者指定</label>
                </div>
                <div class="col">回答者一覧</div>
            </div>
            <div class="row">
                <div class="col">
                    <input type="text" class="form-control" id="respondent" placeholder="日本 太郎">
                </div>
                <div class="col">・・・</div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
