{% extends 'EasySurvey/survey-base.html' %}

{% block title %}
  アンケート削除確認
{% endblock %}

{% block survey_main %}
  <div class="container mt-4">
    <h2><div id="delete-content">{{ survey.title }}</div>を削除しますか？</h2>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">削除</button>
      <a href="{% url 'survey-list' %}" class="btn btn-secondary">キャンセル</a>
    </form>
  </div>
{% endblock %}
