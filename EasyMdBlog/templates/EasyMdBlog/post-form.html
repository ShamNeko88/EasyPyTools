{% extends 'TopPage/base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <h2>{% if form.instance.pk %}記事の編集{% else %}新規投稿{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.title.id_for_label }}" class="form-label">タイトル</label>
            {{ form.title }}
        </div>
        <div class="mb-3">
            <label for="{{ form.content.id_for_label }}" class="form-label">本文（マークダウン形式）</label>
            {{ form.content }}
        </div>
        <button type="submit" class="btn btn-primary">投稿する</button>
    </form>
</div>
{% endblock %}
