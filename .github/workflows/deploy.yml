name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main  # デプロイをトリガーするブランチを指定

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to PythonAnywhere
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_WEBAPP_NAME: ${{ secrets.PA_WEBAPP_NAME }}
        run: |
          # GitHubからPythonAnywhereにコードをコピー
          zip -r deploy.zip .
          curl -u $PA_USERNAME:$PA_API_TOKEN \
            -X POST "https://www.pythonanywhere.com/api/v0/user/$PA_USERNAME/files/path/home/$PA_USERNAME/deploy.zip" \
            --form file=@deploy.zip
          rm deploy.zip

          # PythonAnywhereでデプロイを実行
          curl -u $PA_USERNAME:$PA_API_TOKEN \
            -X POST "https://www.pythonanywhere.com/api/v0/user/$PA_USERNAME/webapps/$PA_WEBAPP_NAME/reload/"
