name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main  # mainブランチにプッシュされたときにデプロイが実行される

jobs:
  deploy:
    runs-on: ubuntu-latest  # Ubuntu環境で実行

    steps:
      # リポジトリのコードをチェックアウト (v3)
      - name: Checkout code
        uses: actions/checkout@v3

      # Python環境をセットアップ (v3)
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.8'  # 使用するPythonのバージョン

      # 依存関係をインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # requirements.txtを使って依存関係をインストール

      # pythonanywhereにデプロイ
      - name: Deploy to PythonAnywhere
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_SSH_KEY: ${{ secrets.PA_SSH_KEY }}  # SSH秘密鍵をGitHub Secretsに保存
        run: |
          # SSH秘密鍵をセット
          mkdir -p ~/.ssh
          echo "$PA_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # PythonAnywhereにSSHで接続してデプロイ
          ssh $PA_USERNAME@ssh.pythonanywhere.com "
            cd /home/$PA_USERNAME/EasyPyTools && \
            git pull origin main && \
            pip install -r requirements.txt && \
            python manage.py migrate && \
            touch EasyPyTools/wsgi.py"



